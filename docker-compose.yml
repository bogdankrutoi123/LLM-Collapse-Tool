services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llm_password}
      POSTGRES_DB: ${POSTGRES_DB:-llm_detector}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llm_network

  # Redis for Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llm_network

  # Backend API — единственный сервис, который собирает thesis-backend:latest
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: thesis-backend:latest
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-llm_user}:${POSTGRES_PASSWORD:-llm_password}@db:5432/${POSTGRES_DB:-llm_detector}
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
      - ./notebooks:/app/notebooks:ro
      - backend_uploads:/app/uploads
      - backend_exports:/app/exports
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - llm_network

  # Local SMTP capture server (dev/demo). Reuses the backend image built above.
  mailcatcher:
    image: thesis-backend:latest
    pull_policy: never
    command: python mail_catcher.py
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8025:8025"
      - "1025:1025"
    depends_on:
      backend:
        condition: service_started
    networks:
      - llm_network

  # Celery Worker (optional for async tasks)
  celery_worker:
    image: thesis-backend:latest
    pull_policy: never
    command: celery -A app.tasks worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-llm_user}:${POSTGRES_PASSWORD:-llm_password}@db:5432/${POSTGRES_DB:-llm_detector}
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
      - ./notebooks:/app/notebooks:ro
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - llm_network

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_exports:

networks:
  llm_network:
    driver: bridge
